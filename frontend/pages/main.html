<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ad Audio Generation</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="font-sans bg-gray-100 text-gray-900 m-0 py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-xl p-10 shadow-md">
      <h1 class="mb-6 text-2xl font-semibold">Select a Brand</h1>

      <label for="brand-select" class="block font-medium mb-2">Brand</label>
      <select id="brand-select" class="
        w-full px-3.5 py-2.5 text-base
        border border-gray-300 rounded-md bg-white
        cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-500
      ">
        <option value="">-- Select a brand --</option>
      </select>

      <div id="brand-details" class="hidden mt-7 pt-7 border-t border-gray-200">
        <h2 id="brand-name" class="mb-3 text-xl font-semibold"></h2>
        <p id="brand-description" class="mb-5 leading-relaxed text-gray-600"></p>
        <p class="font-semibold mb-2">Products</p>
        <ul id="brand-products" class="list-disc ml-5 text-gray-600 leading-loose"></ul>
      </div>

      <button id="submit-btn" class="
        block w-full mt-9 py-3 text-base font-semibold
        text-white bg-blue-500 rounded-md cursor-pointer
        hover:bg-blue-600 active:bg-blue-700
        disabled:bg-blue-300 disabled:cursor-not-allowed
        transition-colors duration-150
      ">Submit</button>

      <div id="audio-result" class="hidden mt-7 pt-7 border-t border-gray-200">
        <p class="font-medium mb-3">Your advertisement is ready:</p>
        <audio id="ad-audio" controls class="w-full"></audio>
      </div>
      <p id="error-message" class="hidden mt-4 text-red-600 text-sm"></p>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
